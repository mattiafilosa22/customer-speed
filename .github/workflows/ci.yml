name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit tests
    runs-on: ubuntu-latest
    env:
      # `prisma generate` (postinstall) resolves `datasource.url` from
      # `prisma.config.ts` eagerly, even though generation never opens a
      # connection — it just needs the env var to be present. This job never
      # talks to a real Postgres (unit tests use tenant-scoped fakes, not a
      # live DB) and starts no DB service (unlike `e2e`), so this value is
      # NEVER dialed — deliberately obvious-fake placeholder, not a credential.
      DATABASE_URL: postgresql://not-a-real-user:not-a-real-password@localhost:5432/unused-placeholder-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # Runs the FULL Playwright suite (login, leads, pipeline incl. keyboard, KPI
    # dashboard, appointments, admin guard, a11y axe smoke, mobile responsive)
    # against an ephemeral Postgres with ALL migrations applied + seed.
    # No real secrets: credentials are the documented DEV seed passwords (test
    # fixtures, not production secrets — they only exist on a throwaway DB).
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: customerspeed
          POSTGRES_PASSWORD: customerspeed
          POSTGRES_DB: customerspeed
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U customerspeed -d customerspeed"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The Playwright webServer runs a PRODUCTION build. NODE_ENV is left UNSET
      # (the build is still production; `next start` defaults the runtime). The
      # rate-limit kill-switch (E2E + RATE_LIMIT_DISABLED) is injected by
      # playwright.config.ts only for the started server.
      DATABASE_URL: postgresql://customerspeed:customerspeed@localhost:5432/customerspeed?schema=public
      NEXTAUTH_SECRET: ci-e2e-only-secret-not-a-real-secret-32chars
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_ORG_SLUG: customerspeed
      # Documented DEV seed passwords (see prisma/seed.ts) — fixtures only.
      SEED_FABIO_PASSWORD: "ChangeMe!Fabio123"
      SEED_SUPERADMIN_PASSWORD: "ChangeMe!Admin123"
      E2E_FABIO_PASSWORD: "ChangeMe!Fabio123"
      E2E_SUPERADMIN_PASSWORD: "ChangeMe!Admin123"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply all migrations to the ephemeral DB
        run: pnpm prisma migrate deploy

      - name: Seed the database
        run: pnpm prisma db seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests (full suite)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
