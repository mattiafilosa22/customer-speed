<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CustomerSpeed">
  <defs>
    <linearGradient id="csGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d6df0"/>
      <stop offset="1" stop-color="#4a48c4"/>
    </linearGradient>
  </defs>
  <!-- squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#csGrad)"/>
  <!-- speed chevrons (motion) -->
  <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.28">
    <path d="M150 188 L214 256 L150 324"/>
  </g>
  <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6">
    <path d="M226 188 L290 256 L226 324"/>
  </g>
  <!-- forward chevron (full) -->
  <g stroke="#ffffff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M302 180 L378 256 L302 332"/>
  </g>
</svg>
